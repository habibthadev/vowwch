name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vowwch typecheck

  lint:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vowwch build
      - run: pnpm lint

  format:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  test:
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vowwch test
      - uses: codecov/codecov-action@v4
        with:
          directory: packages/vowwch/coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  size:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vowwch build
      - run: pnpm --filter vowwch size

  build:
    needs: size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vowwch build
